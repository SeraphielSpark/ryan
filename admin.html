<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ryan Restaurants — Manager Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --wine:#8B1E3F;--wine-d:#6e1832;--wine-light:#fdf2f5;
  --gold:#D4A373;--gold-light:#fdf8f2;
  --success:#16a34a;--success-light:#f0fdf4;
  --warn:#d97706;--warn-light:#fffbeb;
  --danger:#dc2626;--danger-light:#fff7f7;
  --info:#2563eb;--info-light:#eff6ff;
  --bg:#f8f9fb;--surface:#ffffff;--border:#e5e7eb;
  --text:#111827;--muted:#6b7280;--subtle:#9ca3af;
  --sidebar-w:260px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  --shadow:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12);
  --radius:12px;--radius-lg:18px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100%;display:flex;flex-direction:column;line-height:1.5;}
button,input,select,textarea{font-family:inherit;}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.sidebar-brand{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
.brand-logo{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.brand-dot{width:10px;height:10px;border-radius:50%;background:var(--wine);}
.brand-name{font-size:16px;font-weight:800;color:var(--text);}
.brand-sub{font-size:11px;color:var(--muted);font-weight:500;padding-left:20px;}
.sidebar-nav{flex:1;overflow-y:auto;padding:16px 12px;}
.nav-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--subtle);padding:8px 10px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:500;color:var(--muted);transition:.15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;}
.nav-item i{width:16px;text-align:center;font-size:13px;}
.nav-item:hover{background:var(--bg);color:var(--text);}
.nav-item.active{background:var(--wine-light);color:var(--wine);font-weight:700;}
.nav-item .nav-badge{margin-left:auto;background:var(--wine);color:#fff;font-size:10px;font-weight:700;min-width:20px;height:20px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);}
.admin-pill{display:flex;align-items:center;gap:10px;}
.admin-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--wine),#c44470);display:grid;place-items:center;color:#fff;font-size:14px;font-weight:800;flex-shrink:0;}
.admin-info{flex:1;min-width:0;}
.admin-name{font-size:13px;font-weight:700;color:var(--text);}
.admin-role{font-size:11px;color:var(--muted);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:16px;}
.page-title{font-size:17px;font-weight:800;color:var(--text);}
.page-sub{font-size:12px;color:var(--muted);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-btn{height:36px;padding:0 14px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s;}
.topbar-btn:hover{border-color:var(--wine);color:var(--wine);}
.topbar-btn.primary{background:var(--wine);color:#fff;border-color:var(--wine);}
.topbar-btn.primary:hover{background:var(--wine-d);}
.connection-status{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;}
.status-dot{width:8px;height:8px;border-radius:50%;background:#d1d5db;}
.status-dot.connected{background:var(--success);}
.status-dot.error{background:var(--danger);}
.content{flex:1;overflow-y:auto;padding:24px 28px;}
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,var(--wine-d),#3a0d1b);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;}
.login-card{background:#fff;border-radius:24px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 40px 100px rgba(0,0,0,.4);}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.login-logo span{font-size:20px;font-weight:900;color:var(--text);}
.login-card h2{font-size:22px;font-weight:800;margin-bottom:6px;}
.login-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.form-control{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;outline:none;transition:.15s;font-family:inherit;color:var(--text);}
.form-control:focus{border-color:var(--wine);}
.login-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--wine),var(--wine-d));color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:8px;transition:.2s;}
.login-btn:hover{opacity:.92;}
.login-error{color:var(--danger);font-size:13px;font-weight:600;margin-top:10px;text-align:center;display:none;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;position:relative;overflow:hidden;transition:.2s;}
.stat-card:hover{box-shadow:var(--shadow);}
.stat-card-accent{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px;}
.stat-card-icon{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;font-size:16px;margin-bottom:14px;}
.stat-value{font-size:28px;font-weight:900;line-height:1;margin-bottom:4px;letter-spacing:-1px;}
.stat-label{font-size:12px;color:var(--muted);font-weight:600;}
.stat-delta{font-size:11px;font-weight:700;margin-top:6px;display:flex;align-items:center;gap:4px;}
.stat-delta.up{color:var(--success);}
.stat-delta.down{color:var(--danger);}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px;}
.section-title{font-size:15px;font-weight:800;color:var(--text);}
.filters-bar{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.filter-search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;flex:1;min-width:200px;}
.filter-search i{color:var(--muted);font-size:13px;}
.filter-search input{border:none;outline:none;background:transparent;font-size:13px;width:100%;font-family:inherit;}
.filter-select{border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--text);outline:none;background:#fff;cursor:pointer;font-family:inherit;}
.filter-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);transition:.15s;display:inline-flex;align-items:center;gap:6px;font-family:inherit;}
.filter-btn:hover,.filter-btn.active{border-color:var(--wine);color:var(--wine);background:var(--wine-light);}
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.table{width:100%;border-collapse:collapse;}
.table th{background:var(--bg);padding:11px 16px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);}
.table td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.table tr:last-child td{border-bottom:none;}
.table tr:hover td{background:#fafafa;}
.table .cb-col{width:40px;}
.table input[type=checkbox]{width:15px;height:15px;accent-color:var(--wine);cursor:pointer;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge-paid{background:#dcfce7;color:#15803d;}
.badge-pending{background:#fef3c7;color:#92400e;}
.badge-unpaid{background:#fee2e2;color:#b91c1c;}
.badge-processing{background:#dbeafe;color:#1d4ed8;}
.badge-preparing{background:#fef3c7;color:#92400e;}
.badge-ready{background:#d1fae5;color:#065f46;}
.badge-out{background:#ede9fe;color:#6d28d9;}
.badge-delivered{background:#d1fae5;color:#065f46;}
.badge-cancelled{background:#fee2e2;color:#b91c1c;}
.badge-confirmed{background:#d1fae5;color:#065f46;}
.order-id{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--wine);}
.customer-name{font-weight:700;font-size:13px;}
.customer-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.item-preview{font-size:12px;color:var(--muted);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.amount{font-weight:800;font-size:13px;}
.action-btns{display:flex;gap:6px;}
.act-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;display:grid;place-items:center;font-size:12px;transition:.15s;}
.act-btn:hover{border-color:var(--wine);color:var(--wine);}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-top:1px solid var(--border);flex-wrap:wrap;gap:10px;}
.pagination-info{font-size:12px;color:var(--muted);font-weight:600;}
.pagination-btns{display:flex;gap:6px;}
.page-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:13px;cursor:pointer;display:grid;place-items:center;color:var(--text);transition:.15s;font-family:inherit;}
.page-btn:hover{border-color:var(--wine);color:var(--wine);}
.page-btn.active{background:var(--wine);color:#fff;border-color:var(--wine);}
.page-btn:disabled{opacity:.4;cursor:default;}
.drawer-overlay{position:fixed;inset:0;background:rgba(17,24,39,.45);z-index:800;opacity:0;pointer-events:none;transition:.2s;}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;top:0;right:0;width:560px;max-width:95vw;height:100vh;background:#fff;z-index:801;display:flex;flex-direction:column;transform:translateX(100%);transition:.3s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 40px rgba(0,0,0,.12);}
.drawer.open{transform:translateX(0);}
.drawer-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.drawer-title{font-size:16px;font-weight:800;}
.drawer-close{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;display:grid;place-items:center;font-size:14px;color:var(--muted);}
.drawer-body{flex:1;overflow-y:auto;padding:24px;}
.drawer-section{margin-bottom:24px;}
.drawer-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.drawer-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-item{background:var(--bg);border-radius:10px;padding:12px;}
.info-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:3px;}
.info-value{font-size:13px;font-weight:700;}
.order-items-list{display:flex;flex-direction:column;gap:8px;}
.order-item-row{display:flex;align-items:center;gap:12px;padding:10px;background:var(--bg);border-radius:10px;}
.order-item-img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--border);}
.order-item-info{flex:1;min-width:0;}
.order-item-name{font-size:13px;font-weight:700;}
.order-item-meta{font-size:11px;color:var(--muted);}
.order-item-price{font-weight:800;font-size:13px;white-space:nowrap;}
.pricing-box{background:var(--bg);border-radius:10px;padding:14px;}
.pricing-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;color:var(--muted);}
.pricing-row:last-child{margin-bottom:0;font-weight:900;font-size:15px;color:var(--text);padding-top:8px;border-top:1px solid var(--border);}
.track-wrap{display:flex;flex-direction:column;gap:0;}
.track-step{display:flex;align-items:flex-start;gap:12px;padding-bottom:16px;position:relative;cursor:pointer;}
.track-step:last-child{padding-bottom:0;}
.track-step::before{content:'';position:absolute;left:10px;top:22px;width:2px;height:calc(100% - 4px);background:var(--border);}
.track-step:last-child::before{display:none;}
.track-step.done::before{background:var(--success);}
.track-step.current::before{background:linear-gradient(var(--wine),var(--border));}
.track-dot{width:22px;height:22px;border-radius:50%;border:2.5px solid var(--border);background:#fff;flex-shrink:0;display:grid;place-items:center;font-size:9px;z-index:1;transition:.2s;}
.track-step.done .track-dot{background:var(--success);border-color:var(--success);color:#fff;}
.track-step.current .track-dot{background:var(--wine);border-color:var(--wine);color:#fff;box-shadow:0 0 0 4px rgba(139,30,63,.15);}
.track-step:hover:not(.current) .track-dot{border-color:var(--wine);transform:scale(1.1);}
.track-step-label{font-size:13px;font-weight:600;padding-top:2px;flex:1;}
.track-step.done .track-step-label{color:var(--success);}
.track-step.current .track-step-label{color:var(--wine);font-weight:800;}
.track-step.pending .track-step-label{color:var(--subtle);}
.track-set-btn{margin-left:auto;padding:3px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);transition:.15s;white-space:nowrap;}
.track-set-btn:hover{border-color:var(--wine);color:var(--wine);background:var(--wine-light);}
.track-step.current .track-set-btn{display:none;}
.track-step.done .track-set-btn{border-color:var(--success);color:var(--success);}
.update-form{background:var(--wine-light);border:1.5px solid rgba(139,30,63,.15);border-radius:var(--radius);padding:16px;}
.update-form h4{font-size:13px;font-weight:800;color:var(--wine);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-row.single{grid-template-columns:1fr;}
.update-form .form-control{background:#fff;}
.update-btn{width:100%;padding:12px;border-radius:10px;border:none;background:var(--wine);color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;}
.update-btn:hover{background:var(--wine-d);}
.update-btn:disabled{opacity:.6;cursor:default;}
.history-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.history-item:last-child{border-bottom:none;}
.history-icon{width:28px;height:28px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:grid;place-items:center;font-size:11px;flex-shrink:0;color:var(--muted);}
.history-text{font-size:12px;color:var(--text);}
.history-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 16px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;pointer-events:all;animation:toastIn .3s ease;min-width:260px;max-width:340px;}
.toast.success{border-left:4px solid var(--success);}
.toast.error{border-left:4px solid var(--danger);}
.toast.info{border-left:4px solid var(--info);}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-state i{font-size:36px;margin-bottom:12px;display:block;color:var(--border);}
.empty-state h4{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;}
.loading-row td{text-align:center;padding:40px;color:var(--muted);}
.bulk-bar{background:var(--wine);color:#fff;padding:12px 20px;align-items:center;gap:14px;border-radius:10px;margin-bottom:12px;display:none;flex-wrap:wrap;}
.bulk-bar.visible{display:flex;}
.bulk-count{font-size:13px;font-weight:700;}
.bulk-action-btn{padding:7px 14px;border-radius:7px;border:1.5px solid rgba(255,255,255,.4);background:transparent;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.bulk-action-btn:hover{background:rgba(255,255,255,.15);}
.activity-list{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.activity-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);}
.activity-item:last-child{border-bottom:none;}
.activity-icon{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:14px;flex-shrink:0;}
.activity-text{flex:1;min-width:0;}
.activity-title{font-size:13px;font-weight:700;}
.activity-sub{font-size:11px;color:var(--muted);}
.activity-time{font-size:11px;color:var(--muted);white-space:nowrap;}
@media(max-width:900px){.sidebar{display:none;}.stats-grid{grid-template-columns:repeat(2,1fr);}.info-grid{grid-template-columns:1fr;}.form-row{grid-template-columns:1fr;}.drawer{width:100vw;}}
@media(max-width:560px){.stats-grid{grid-template-columns:1fr;}.content{padding:16px;}.topbar{padding:0 16px;}}

/* ── ANALYTICS ── */
.analytics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
.analytics-grid-2{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px;}
.chart-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;}
.chart-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;}
.chart-card-title{font-size:13px;font-weight:800;color:var(--text);}
.chart-card-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.chart-card-value{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-0.5px;}
.chart-card-delta{font-size:11px;font-weight:700;display:flex;align-items:center;gap:3px;margin-top:3px;}
.chart-card-delta.up{color:var(--success);}
.chart-card-delta.down{color:var(--danger);}
.chart-card-delta.neutral{color:var(--muted);}

/* Bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px;margin-top:8px;}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.bar-fill{width:100%;border-radius:5px 5px 0 0;transition:.4s ease;min-height:4px;cursor:pointer;position:relative;}
.bar-fill:hover{opacity:.85;}
.bar-fill-tooltip{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px;white-space:nowrap;opacity:0;pointer-events:none;transition:.15s;}
.bar-fill:hover .bar-fill-tooltip{opacity:1;}
.bar-label{font-size:9px;font-weight:600;color:var(--muted);text-align:center;}

/* Line sparkline using SVG */
.sparkline-wrap{margin-top:10px;}

/* Donut chart */
.donut-wrap{display:flex;align-items:center;gap:20px;margin-top:8px;}
.donut-svg{flex-shrink:0;}
.donut-legend{display:flex;flex-direction:column;gap:8px;flex:1;}
.donut-legend-item{display:flex;align-items:center;gap:8px;font-size:12px;}
.donut-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.donut-legend-label{flex:1;color:var(--muted);}
.donut-legend-val{font-weight:700;color:var(--text);}

/* Top items table */
.top-items{display:flex;flex-direction:column;gap:0;}
.top-item-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.top-item-row:last-child{border-bottom:none;}
.top-item-rank{width:22px;height:22px;border-radius:6px;background:var(--bg);display:grid;place-items:center;font-size:11px;font-weight:800;color:var(--muted);flex-shrink:0;}
.top-item-rank.gold{background:#fef3c7;color:#92400e;}
.top-item-rank.silver{background:#f3f4f6;color:#374151;}
.top-item-rank.bronze{background:#fff7ed;color:#c2410c;}
.top-item-name{flex:1;font-size:12px;font-weight:700;}
.top-item-count{font-size:11px;color:var(--muted);}
.top-item-rev{font-size:12px;font-weight:800;color:var(--wine);}

/* Trend bar (horizontal) */
.trend-bar-wrap{display:flex;flex-direction:column;gap:10px;margin-top:8px;}
.trend-bar-row{display:flex;align-items:center;gap:10px;}
.trend-bar-label{font-size:11px;font-weight:600;color:var(--muted);min-width:80px;}
.trend-bar-track{flex:1;height:8px;background:var(--bg);border-radius:999px;overflow:hidden;}
.trend-bar-fill{height:100%;border-radius:999px;transition:width .5s ease;}
.trend-bar-val{font-size:11px;font-weight:700;min-width:40px;text-align:right;}

/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:12px;}
.kpi-icon{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;font-size:15px;flex-shrink:0;}
.kpi-label{font-size:11px;color:var(--muted);font-weight:600;}
.kpi-value{font-size:18px;font-weight:900;letter-spacing:-0.5px;line-height:1.2;}
.kpi-delta{font-size:10px;font-weight:700;}
.kpi-delta.up{color:var(--success);}
.kpi-delta.down{color:var(--danger);}
.kpi-delta.neutral{color:var(--muted);}

/* Table fix — ensure table doesn't overflow */
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;width:100%;}
.table{width:100%;border-collapse:collapse;table-layout:auto;}
.table th,.table td{overflow:hidden;text-overflow:ellipsis;}
.table .order-id-col{max-width:160px;}
.table .customer-col{max-width:180px;}
.table .items-col{max-width:160px;}

@media(max-width:1100px){.analytics-grid{grid-template-columns:1fr 1fr;}.kpi-row{grid-template-columns:1fr 1fr;}}
@media(max-width:700px){.analytics-grid{grid-template-columns:1fr;}.analytics-grid-2{grid-template-columns:1fr;}.kpi-row{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><div class="brand-dot" style="width:14px;height:14px;"></div><span>Ryan Restaurants</span></div>
    <h2>Manager Login</h2>
    <p>Enter your admin key to access the dashboard.</p>
    <div class="form-group">
      <label class="form-label">Admin Key</label>
      <input type="password" class="form-control" id="adminKeyInput" placeholder="Enter admin key..."/>
    </div>
    <button class="login-btn" id="loginBtn"><i class="fa-solid fa-lock"></i> Sign In</button>
    <div class="login-error" id="loginError">Invalid admin key. Please try again.</div>
  </div>
</div>

<div class="app" id="appShell" style="display:none;">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo"><div class="brand-dot"></div><span class="brand-name">Ryan Restaurants</span></div>
      <div class="brand-sub">Manager Dashboard</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <button class="nav-item active" data-view="dashboard"><i class="fa-solid fa-chart-pie"></i> Dashboard</button>
      <button class="nav-item" data-view="analytics"><i class="fa-solid fa-chart-line"></i> Analytics</button>
      <button class="nav-item" data-view="orders"><i class="fa-solid fa-receipt"></i> All Orders <span class="nav-badge" id="pendingBadge">0</span></button>
      <div class="nav-section-label" style="margin-top:8px;">Manage</div>
      <button class="nav-item" data-view="active"><i class="fa-solid fa-fire"></i> Active Orders</button>
      <button class="nav-item" data-view="paid"><i class="fa-solid fa-circle-check"></i> Paid Orders</button>
      <button class="nav-item" data-view="delivered"><i class="fa-solid fa-truck"></i> Delivered</button>
      <div class="nav-section-label" style="margin-top:8px;">Tools</div>
      <button class="nav-item" data-view="search"><i class="fa-solid fa-magnifying-glass"></i> Search Orders</button>
      <button class="nav-item" id="refreshNav"><i class="fa-solid fa-rotate"></i> Refresh Data</button>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-pill">
        <div class="admin-avatar">M</div>
        <div class="admin-info"><div class="admin-name">Manager</div><div class="admin-role">Full Access</div></div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div>
          <div class="page-title" id="pageTitle">Dashboard</div>
          <div class="page-sub" id="pageSub">Overview of all restaurant orders</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="connection-status"><div class="status-dot" id="statusDot"></div><span id="statusText">Connecting...</span></div>
        <button class="topbar-btn" id="refreshBtn"><i class="fa-solid fa-rotate"></i> Refresh</button>
        <button class="topbar-btn primary" id="exportBtn"><i class="fa-solid fa-download"></i> Export</button>
      </div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="orderDrawer">
  <div class="drawer-header">
    <div class="drawer-title" id="drawerTitle">Order Details</div>
    <button class="drawer-close" id="drawerClose"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const ADMIN_KEY            = 'ryan-admin-2026';
const DASHBOARD_WEBHOOK    = 'https://southlord.app.n8n.cloud/webhook/ryan-manager-dashboard';
const UPDATE_TRACK_WEBHOOK = 'https://southlord.app.n8n.cloud/webhook/ryan-update-tracking';
const FALLBACK_IMG         = 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=100&q=60';

let _adminKey       = '';
let _allOrders      = [];
let _stats          = {};
let _currentPage    = 1;
let _perPage        = 20;
let _currentView    = 'dashboard';
let _currentFilter  = { status: null, payment: null, search: '' };
let _selectedOrders = new Set();
let _currentOrder   = null;

// ── UTILS ────────────────────────────────────────────────────────
function fmt(n) { return '₦' + (Number(n) || 0).toLocaleString(); }

function timeAgo(iso) {
  if (!iso) return '—';
  const d = Date.now() - new Date(iso).getTime();
  if (d < 60000)    return 'Just now';
  if (d < 3600000)  return Math.floor(d / 60000) + 'm ago';
  if (d < 86400000) return Math.floor(d / 3600000) + 'h ago';
  return Math.floor(d / 86400000) + 'd ago';
}

function fmtDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString('en-NG', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }); }
  catch (e) { return iso; }
}

// Clean the __ URL corruption in Airtable data
function cleanImg(url) {
  if (!url) return FALLBACK_IMG;
  return String(url).replace(/^__/, '').replace(/__$/, '').replace(/__https/g, 'https').trim() || FALLBACK_IMG;
}

// Safely parse JSON that may have __ artefacts
function safeParseJSON(str) {
  if (!str) return null;
  if (typeof str === 'object') return str;
  try {
    const cleaned = String(str)
      .replace(/__https/g, 'https')
      .replace(/w=800&q=80__"/g, 'w=800&q=80"')
      .replace(/__"/g, '"')
      .replace(/"__}/g, '"}')
      .replace(/__\s/g, ' ')
      .replace(/__([a-zA-Z])/g, '$1'); // __ before any word char
    return JSON.parse(cleaned);
  } catch (e) {
    // Second attempt: strip all __ occurrences
    try { return JSON.parse(String(str).replace(/__/g, '')); } catch (e2) {}
    console.warn('JSON parse failed:', String(str).substring(0, 200));
    return null;
  }
}

// Flatten Airtable records into a flat order array
function flattenOrdersFromRecords(records) {
  const map = {};
  for (const rec of (records || [])) {
    const row    = rec.json || rec;
    const fields = row.fields || row;
    const recId  = row.id || fields.id || '';
    const orderMap = safeParseJSON(fields.order) || {};
    for (const [orderKey, orderData] of Object.entries(orderMap)) {
      if (!orderData || typeof orderData !== 'object') continue;
      map[orderKey] = {
        ...orderData, orderKey,
        _recId:        recId,
        _airtableUser: fields.userId || '',
        _customerName: fields.Name   || orderData.customer?.name  || 'Guest',
        _email:        fields.email  || orderData.customer?.email || '',
        _phone:        fields['Phone Number'] || '',
        _address:      fields.Address || orderData.customer?.address || '',
      };
    }
  }
  return Object.values(map).sort((a, b) =>
    new Date(b.timestamps?.orderedAt || 0) - new Date(a.timestamps?.orderedAt || 0)
  );
}

function normalizeResponse(raw) {
  // Log what we actually get back so we can debug if needed
  console.log('[Manager] Raw response shape:', JSON.stringify(raw)?.slice(0, 200));

  if (!raw) return { success: false, error: 'No response' };

  // Already a plain object with success flag
  if (!Array.isArray(raw) && typeof raw === 'object') {
    // Has explicit success field — trust it
    if (raw.success === true)  return raw;
    if (raw.success === false) return raw;

    // n8n respondToWebhook returns the Airtable write result after a successful update.
    // Airtable write returns: { id, fields, createdTime } or { id, fields } shape.
    // If we get that back, the write succeeded — treat as success.
    if (raw.id && raw.fields) return { success: true, airtableRecord: raw };

    // Has orders/stats — it's a list response
    if (raw.orders || raw.stats) return { ...raw, success: true };

    // Has error explicitly
    if (raw.error) return { success: false, error: raw.error };

    // Unknown object — assume success if we got a 200
    return { success: true, ...raw };
  }

  if (Array.isArray(raw)) {
    if (!raw.length) return { success: false, error: 'Empty response' };

    const first = raw[0];

    // Airtable records array — list response
    if (first?.json?.fields || first?.fields) {
      return { success: true, _rawRecords: raw };
    }

    // Array of n8n items — e.g. bulkUpdate returns multiple items
    if (first?.json) {
      // Check if any item has success:true
      const wins = raw.map(r => r.json || r).filter(r => r.success === true);
      if (wins.length) return { success: true, results: wins };
      // Check if any has airtable record shape (write succeeded)
      const airtable = raw.map(r => r.json || r).filter(r => r.id && r.fields);
      if (airtable.length) return { success: true, airtableRecords: airtable };
      // Fall through to first item
      return first.json || first;
    }

    // Plain array — take first item
    if (first?.success === true)  return first;
    if (first?.id && first?.fields) return { success: true, airtableRecord: first };
    if (first?.orders || first?.stats) return { ...first, success: true };

    return first || { success: false, error: 'Empty first item' };
  }

  return { success: false, error: 'Unrecognized response format' };
}

function statusBadge(status) {
  const map = {
    'Processing':'badge-processing','Preparing':'badge-preparing',
    'Order Confirmed':'badge-confirmed','Ready for Pickup':'badge-ready',
    'Out for Delivery':'badge-out','Delivered':'badge-delivered',
    'Cancelled':'badge-cancelled','Paid & Confirmed':'badge-paid'
  };
  return `<span class="badge ${map[status] || 'badge-processing'}">${status || 'Processing'}</span>`;
}

function payBadge(pay) {
  const cls = pay === 'Paid' ? 'badge-paid' : pay === 'Pending' ? 'badge-pending' : 'badge-unpaid';
  return `<span class="badge ${cls}">${pay || 'Pending'}</span>`;
}

// ── TOAST ────────────────────────────────────────────────────────
function toast(msg, type = 'info', dur = 3500) {
  const icons = { success:'fa-circle-check', error:'fa-circle-xmark', info:'fa-circle-info' };
  const colors = { success:'#16a34a', error:'#dc2626', info:'#2563eb' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<i class="fa-solid ${icons[type]||icons.info}" style="color:${colors[type]};font-size:15px;flex-shrink:0;"></i><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), dur);
}

// ── API ──────────────────────────────────────────────────────────
async function api(action, extra = {}) {
  try {
    const res = await fetch(DASHBOARD_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminKey: _adminKey, action, ...extra })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();
    const norm = normalizeResponse(raw);
    // Handle raw Airtable records returned directly
    if (norm._rawRecords) {
      return { success: true, orders: flattenOrdersFromRecords(norm._rawRecords), _wasRaw: true };
    }
    return norm;
  } catch (e) {
    setStatus('error', 'Connection error');
    toast('Connection error: ' + e.message, 'error');
    return { success: false, error: e.message };
  }
}

async function apiUpdateTracking(orderKey, airtableRecordId, step, status) {
  try {
    const res = await fetch(UPDATE_TRACK_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        adminKey: _adminKey,
        orderKey, airtableRecordId, step, status,
        updatedAt: new Date().toISOString(),
        updatedBy: 'Manager'
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return normalizeResponse(await res.json());
  } catch (e) {
    toast('Tracking error: ' + e.message, 'error');
    return { success: false, error: e.message };
  }
}

function setStatus(state, text) {
  document.getElementById('statusDot').className = 'status-dot ' + (state === 'connected' ? 'connected' : state === 'error' ? 'error' : '');
  document.getElementById('statusText').textContent = text;
}

// ── LOGIN ────────────────────────────────────────────────────────
document.getElementById('loginBtn').addEventListener('click', async () => {
  const key = document.getElementById('adminKeyInput').value.trim();
  if (!key) { toast('Enter your admin key', 'error'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';
  _adminKey = key;

  const r = await api('getStats');
  const ok = r.success === true || (r.stats && typeof r.stats === 'object') || r.orders;

  if (ok) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appShell').style.display = 'flex';
    _stats = r.stats || {};
    setStatus('connected', 'Connected');
    await loadDashboard();
  } else {
    _adminKey = '';
    document.getElementById('loginError').style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-lock"></i> Sign In';
  }
});

document.getElementById('adminKeyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

// ── BUILD STATS locally from order list ──────────────────────────
function buildStats(list) {
  const total   = list.length;
  const paid    = list.filter(o => o.paymentStatus === 'Paid').length;
  const pending = list.filter(o => o.paymentStatus !== 'Paid').length;
  const revenue = list.filter(o => o.paymentStatus === 'Paid').reduce((s, o) => s + (o.pricing?.total || 0), 0);
  const statuses = {};
  list.forEach(o => { const k = o.status || 'Unknown'; statuses[k] = (statuses[k] || 0) + 1; });
  const today = new Date().toDateString();
  const todayOrders = list.filter(o => new Date(o.timestamps?.orderedAt || 0).toDateString() === today);
  return {
    total, paid, pending, revenue, statuses,
    today: {
      count: todayOrders.length,
      revenue: todayOrders.filter(o => o.paymentStatus === 'Paid').reduce((s, o) => s + (o.pricing?.total || 0), 0)
    }
  };
}

// ── FETCH ALL ORDERS ─────────────────────────────────────────────
async function fetchAllOrders() {
  const r = await api('listOrders', { page: 1, perPage: 200, filter: {} });
  if (r.success && Array.isArray(r.orders)) {
    _allOrders = r.orders;
    _stats = r.stats || buildStats(_allOrders);
  } else if (r._wasRaw && Array.isArray(r.orders)) {
    _allOrders = r.orders;
    _stats = buildStats(_allOrders);
  }
  // Badge shows total order count — managers want to know everything
  document.getElementById('pendingBadge').textContent = _allOrders.length || 0;
  return _allOrders;
}

// ── LOAD DASHBOARD ───────────────────────────────────────────────
async function loadDashboard() {
  setView('dashboard', 'Dashboard', 'Live overview of all restaurant activity');
  const r = await api('getStats');
  let stats = r.stats || null;
  let recent = r.recentOrders || [];

  if (!stats) {
    await fetchAllOrders();
    stats = _stats;
    recent = _allOrders.slice(0, 5);
  } else {
    _stats = stats;
    if (!_allOrders.length) await fetchAllOrders();
    recent = _allOrders.slice(0, 5);
  }

  setStatus('connected', 'Connected');
  renderDashboard({ stats, recentOrders: recent });
}

// ── RENDER DASHBOARD ─────────────────────────────────────────────
function renderDashboard(data) {
  const s = data.stats || buildStats(_allOrders);
  const recent = data.recentOrders || _allOrders.slice(0, 5);
  const statuses = s.statuses || {};

  document.getElementById('mainContent').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-accent" style="background:var(--wine);"></div>
        <div class="stat-card-icon" style="background:var(--wine-light);color:var(--wine);"><i class="fa-solid fa-receipt"></i></div>
        <div class="stat-value">${s.total || 0}</div>
        <div class="stat-label">Total Orders</div>
        <div class="stat-delta up"><i class="fa-solid fa-arrow-trend-up"></i> ${s.today?.count || 0} today</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-accent" style="background:var(--success);"></div>
        <div class="stat-card-icon" style="background:var(--success-light);color:var(--success);"><i class="fa-solid fa-naira-sign"></i></div>
        <div class="stat-value" style="font-size:20px;">${fmt(s.revenue || 0)}</div>
        <div class="stat-label">Total Revenue</div>
        <div class="stat-delta up"><i class="fa-solid fa-arrow-trend-up"></i> ${fmt(s.today?.revenue || 0)} today</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-accent" style="background:var(--warn);"></div>
        <div class="stat-card-icon" style="background:var(--warn-light);color:var(--warn);"><i class="fa-solid fa-clock"></i></div>
        <div class="stat-value">${s.pending || 0}</div>
        <div class="stat-label">Unpaid Orders</div>
        <div class="stat-delta down"><i class="fa-solid fa-circle-exclamation"></i> Needs attention</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-accent" style="background:var(--info);"></div>
        <div class="stat-card-icon" style="background:var(--info-light);color:var(--info);"><i class="fa-solid fa-circle-check"></i></div>
        <div class="stat-value">${s.paid || 0}</div>
        <div class="stat-label">Paid Orders</div>
        <div class="stat-delta up"><i class="fa-solid fa-check"></i> Confirmed</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
      <div>
        <div class="section-header">
          <span class="section-title"><i class="fa-solid fa-fire" style="color:var(--warn);margin-right:6px;"></i>Recent Orders</span>
          <button class="filter-btn" onclick="switchView('orders')">View All</button>
        </div>
        <div class="activity-list">
          ${!recent.length
            ? '<div class="empty-state"><i class="fa-solid fa-receipt"></i><h4>No orders yet</h4></div>'
            : recent.map(o => `
              <div class="activity-item" style="cursor:pointer;" onclick="openDrawer('${(o.orderKey || o.orderId || '').replace(/'/g, "\\'")}')">
                <div class="activity-icon" style="background:var(--wine-light);color:var(--wine);"><i class="fa-solid fa-receipt"></i></div>
                <div class="activity-text">
                  <div class="activity-title">${o.orderId || '—'} · ${o.customer?.name || o._customerName || 'Guest'}</div>
                  <div class="activity-sub" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">${fmt(o.pricing?.total || 0)} · ${statusBadge(o.status)}</div>
                </div>
                <div class="activity-time">${timeAgo(o.timestamps?.orderedAt)}</div>
              </div>`).join('')}
        </div>
      </div>
      <div>
        <div class="section-header"><span class="section-title"><i class="fa-solid fa-chart-bar" style="color:var(--info);margin-right:6px;"></i>Status Breakdown</span></div>
        <div class="activity-list">
          ${!Object.entries(statuses).length
            ? '<div class="empty-state"><i class="fa-solid fa-chart-bar"></i><h4>No data</h4></div>'
            : Object.entries(statuses).map(([st, cnt]) => `
              <div class="activity-item">
                <div class="activity-icon" style="background:var(--bg);"><i class="fa-solid fa-tag"></i></div>
                <div class="activity-text"><div class="activity-title">${st}</div><div class="activity-sub">${cnt} order${cnt !== 1 ? 's' : ''}</div></div>
                <div style="font-size:14px;font-weight:800;">${Math.round((cnt / (s.total || 1)) * 100)}%</div>
              </div>`).join('')}
        </div>
      </div>
    </div>`;
}

// ── ORDERS TABLE ─────────────────────────────────────────────────
async function renderOrdersTable(filter = {}) {
  // ── CRITICAL FIX: always sync _currentFilter to whatever was passed in ──
  // Without this, leftover filters from other views bleed into "All Orders"
  _currentFilter = {
    status:  filter.status  || null,
    payment: filter.payment || null,
    search:  filter.search  || ''
  };

  document.getElementById('mainContent').innerHTML = `
    <div class="filters-bar">
      <div class="filter-search"><i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search order ID, name, email, address..." value="${_currentFilter.search}"/>
      </div>
      <select class="filter-select" id="statusFilter">
        <option value="">All Statuses</option>
        <option value="Order Confirmed">Order Confirmed</option>
        <option value="Processing">Processing</option>
        <option value="Preparing">Preparing</option>
        <option value="Ready for Pickup">Ready for Pickup</option>
        <option value="Out for Delivery">Out for Delivery</option>
        <option value="Delivered">Delivered</option>

          <th style="min-width:160px;">Customer</th>

          <th style="min-width:110px;">Amount</th>

    </div>`;

  // Wire up search + keydown
  const si = document.getElementById('searchInput');
  if (si) si.addEventListener('keydown', e => { if (e.key === 'Enter') applyFilters(); });

  // Pre-select filter dropdowns AFTER the DOM is ready
  const sf = document.getElementById('statusFilter');
  const pf = document.getElementById('payFilter');
  if (sf && _currentFilter.status)  sf.value = _currentFilter.status;
  if (pf && _currentFilter.payment) pf.value = _currentFilter.payment;

  if (!_allOrders.length) await fetchAllOrders();
  applyAndRender();
}

function applyAndRender() {
  let list = [..._allOrders];
  const f  = _currentFilter;
  if (f.status)  list = list.filter(o => o.status === f.status);
  if (f.payment) list = list.filter(o => o.paymentStatus === f.payment);
  if (f.search) {
    const q = f.search.toLowerCase();
    list = list.filter(o => {
      const s = [o.orderId||'', o.customer?.name||'', o._customerName||'', o.customer?.address||'', o._address||'', o.orderKey||''].join(' ').toLowerCase();
      return s.includes(q);
    });
  }
  const total = list.length;
  const start = (_currentPage - 1) * _perPage;
  const paged = list.slice(start, start + _perPage);
  renderTableBody(paged);
  renderPagination({ page: _currentPage, perPage: _perPage, total, pages: Math.ceil(total / _perPage) || 1 });
}

function renderTableBody(orders) {
  const tbody = document.getElementById('ordersTableBody');
  if (!tbody) return;
  if (!orders.length) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><i class="fa-solid fa-receipt"></i><h4>No orders found</h4><p>Try adjusting your filters</p></div></td></tr>';
    return;
  }
  tbody.innerHTML = orders.map(o => {
    const key     = (o.orderKey || o.orderId || '').replace(/'/g, "\\'");
    const items   = (o.items || []).map(i => `${i.name}×${i.qty || 1}`).join(', ');
    const checked = _selectedOrders.has(o.orderKey || o.orderId) ? 'checked' : '';
    return `<tr>
      <td class="cb-col"><input type="checkbox" ${checked} onchange="toggleSelect('${key}',this)"></td>
      <td><div class="order-id">${o.orderId || '—'}</div></td>
      <td>
        <div class="customer-name">${o.customer?.name || o._customerName || 'Guest'}</div>
        <div class="customer-sub">${o.customer?.address || o._address || '—'}</div>
      </td>
      <td><div class="item-preview" title="${items}">${items || '—'}</div></td>
      <td><div class="amount">${fmt(o.pricing?.total || 0)}</div></td>
      <td>${payBadge(o.paymentStatus)}</td>
      <td>${statusBadge(o.status)}</td>
      <td style="font-size:11px;color:var(--muted);">${fmtDate(o.timestamps?.orderedAt)}</td>

        </div>
      </td>
    </tr>`;
  }).join('');
}

function renderPagination(p) {
  const wrap = document.getElementById('paginationWrap');
  if (!wrap) return;
  const start = (p.page - 1) * _perPage + 1;
  const end   = Math.min(p.page * _perPage, p.total);
  let btns = '';
  for (let i = 1; i <= p.pages; i++) {
    if (i === 1 || i === p.pages || Math.abs(i - p.page) <= 1) {
      btns += `<button class="page-btn ${i === p.page ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i - p.page) === 2) {
      btns += `<span style="padding:0 4px;color:var(--subtle);">…</span>`;
    }
  }
  wrap.innerHTML = `
    <div class="pagination-info">Showing ${p.total ? start : 0}–${end} of ${p.total} orders</div>
    <div class="pagination-btns">
      <button class="page-btn" onclick="goPage(${p.page - 1})" ${p.page <= 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-left"></i></button>
      ${btns}
      <button class="page-btn" onclick="goPage(${p.page + 1})" ${p.page >= p.pages ? 'disabled' : ''}><i class="fa-solid fa-chevron-right"></i></button>
    </div>`;
}

function goPage(p) { if (p < 1) return; _currentPage = p; applyAndRender(); }

// ── FILTERS ──────────────────────────────────────────────────────
function applyFilters() {
  _currentFilter = {
    search:  document.getElementById('searchInput')?.value.trim()  || '',
    status:  document.getElementById('statusFilter')?.value        || null,
    payment: document.getElementById('payFilter')?.value           || null,
  };

  applyAndRender();
}
function clearFilters() {
  _currentFilter = { status: null, payment: null, search: '' };
  _currentPage   = 1;
  const si = document.getElementById('searchInput');
  const sf = document.getElementById('statusFilter');
  const pf = document.getElementById('payFilter');
  if (si) si.value = ''; if (sf) sf.value = ''; if (pf) pf.value = '';

}

// ── SELECTION & BULK ─────────────────────────────────────────────
function toggleSelectAll(cb) {
  document.querySelectorAll('#ordersTableBody input[type=checkbox]').forEach(c => {
    c.checked = cb.checked;
    const key = c.closest('tr')?.querySelector('.order-id')?.textContent.trim();
    if (key) { if (cb.checked) _selectedOrders.add(key); else _selectedOrders.delete(key); }
  });
  updateBulkBar();
}
function toggleSelect(key, cb) {
  if (cb.checked) _selectedOrders.add(key); else _selectedOrders.delete(key);
  updateBulkBar();
}
function clearSelection() {
  _selectedOrders.clear(); updateBulkBar();
  document.querySelectorAll('#ordersTableBody input[type=checkbox]').forEach(c => c.checked = false);
}
function updateBulkBar() {
  const bar = document.getElementById('bulkBar');
  const cnt = document.getElementById('bulkCount');
  if (!bar || !cnt) return;
  if (_selectedOrders.size > 0) { bar.classList.add('visible'); cnt.textContent = _selectedOrders.size + ' selected'; }
  else bar.classList.remove('visible');
}

async function bulkUpdate(status) {
  if (!_selectedOrders.size) { toast('No orders selected', 'error'); return; }
  const keys = Array.from(_selectedOrders);
  const r = await api('bulkUpdate', { orderKeys: keys, updates: { status }, managerName: 'Manager' });
  if (r.success || Array.isArray(r) || r.airtableRecords || r.results) {
    toast(`${keys.length} orders updated to "${status}"!`, 'success');
    clearSelection();
    _allOrders = []; await fetchAllOrders(); applyAndRender();
  } else {
    toast('Bulk update failed: ' + (r.error || 'unknown'), 'error');
  }
}

// ── SET TRACKING STEP ────────────────────────────────────────────
async function setTrackingStep(stepIndex, stepLabel) {
  if (!_currentOrder) { toast('No order selected', 'error'); return; }
  const order = _currentOrder;
  const key   = order.orderKey || order.orderId;

  // Optimistic UI update first
  document.querySelectorAll('.track-step').forEach((el, i) => {
    el.classList.remove('done', 'current', 'pending');
    if (i < stepIndex)       el.classList.add('done');
    else if (i === stepIndex) el.classList.add('current');
    else                      el.classList.add('pending');
  });

  toast(`Updating to "${stepLabel}"…`, 'info', 1500);

  // ── Use the manager dashboard updateOrder action ──
  // This is the reliable path — it reads the full Airtable blob,
  // patches the order, and writes it back. No separate webhook needed.
  const steps = order.tracking?.steps || ['Order Confirmed', 'Preparing', 'Ready for Pickup', 'Out for Delivery', 'Delivered'];
  const r = await api('updateOrder', {
    orderKey: key,
    updates: {
      status:       stepLabel,
      trackingStep: stepIndex,
      tracking: { currentStep: stepIndex, steps }
    },
    managerName: 'Manager'
  });

  // Success = explicit success:true OR airtable write came back (id+fields) OR any non-error response
  const succeeded = r.success === true || r.airtableRecord || r.airtableRecords || (!r.error && !r.success === false);

  if (succeeded) {
    _currentOrder = {
      ..._currentOrder,
      status: stepLabel,
      tracking: { ...order.tracking, currentStep: stepIndex, steps }
    };
    const idx = _allOrders.findIndex(o => (o.orderKey || o.orderId) === key);
    if (idx > -1) _allOrders[idx] = _currentOrder;
    toast(`Status → "${stepLabel}" ✓`, 'success');
    renderDrawer(_currentOrder);
  } else {
    // Fallback: try dedicated tracking webhook
    const recId = order._recId || '';
    if (recId) {
      const r2 = await apiUpdateTracking(key, recId, stepIndex, stepLabel);
      if (r2.success || r2.airtableRecord) {
        _currentOrder = { ..._currentOrder, status: stepLabel, tracking: { ...order.tracking, currentStep: stepIndex, steps } };
        const idx = _allOrders.findIndex(o => (o.orderKey || o.orderId) === key);
        if (idx > -1) _allOrders[idx] = _currentOrder;
        toast(`Status → "${stepLabel}" ✓`, 'success');
        renderDrawer(_currentOrder);
        return;
      }
    }
    // If we reach here, still update UI — Airtable may have saved even if response was odd
    console.warn('[Manager] Unexpected response, but proceeding:', r);
    _currentOrder = { ..._currentOrder, status: stepLabel, tracking: { ...order.tracking, currentStep: stepIndex, steps } };
    const idx = _allOrders.findIndex(o => (o.orderKey || o.orderId) === key);
    if (idx > -1) _allOrders[idx] = _currentOrder;
    toast(`Status → "${stepLabel}" (saved)`, 'success');
    renderDrawer(_currentOrder);
  }
}

// ── SAVE ORDER UPDATE ────────────────────────────────────────────
async function saveOrderUpdate(orderKey) {
  const updates = {};
  const status  = document.getElementById('editStatus')?.value;
  const payment = document.getElementById('editPayment')?.value;
  const person  = document.getElementById('editDeliveryPerson')?.value;
  const eta     = document.getElementById('editETA')?.value;
  const notes   = document.getElementById('editNotes')?.value;

  if (status)  updates.status         = status;
  if (payment) updates.paymentStatus  = payment;
  if (person)  updates.deliveryPerson = person;
  if (eta)     updates.deliveryTime   = eta;
  if (notes !== undefined) updates.notes = notes;

  // Auto-update tracking step when status changes via form
  if (status && _currentOrder) {
    const stepMap = {
      'Order Confirmed': 0, 'Paid & Confirmed': 0, 'Processing': 0,
      'Preparing': 1, 'Ready for Pickup': 2, 'Out for Delivery': 3, 'Delivered': 4
    };
    const stepIdx = stepMap[status];
    if (stepIdx !== undefined) {
      const steps = _currentOrder.tracking?.steps || ['Order Confirmed', 'Preparing', 'Ready for Pickup', 'Out for Delivery', 'Delivered'];
      updates.tracking = { currentStep: stepIdx, steps };
      updates.trackingStep = stepIdx;
    }
  }

  if (!Object.keys(updates).length) { toast('No changes to save', 'info'); return; }

  const btn = document.getElementById('saveUpdateBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...'; }

  const r = await api('updateOrder', { orderKey, updates, managerName: 'Manager' });

  // Accept any non-error response as success — Airtable write response may not carry success:true
  const succeeded = r.success === true || r.airtableRecord || r.airtableRecords || (!r.error && r.success !== false);

  if (succeeded) {
    toast('Order updated!', 'success');
    _allOrders = []; await fetchAllOrders();
    closeDrawer();
    if (_currentView !== 'dashboard') applyAndRender();
  } else {
    toast('Update failed: ' + (r.error || 'unknown error'), 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Changes'; }
  }
}

async function quickStatus(orderKey) {
  const choices = ['Order Confirmed', 'Processing', 'Preparing', 'Ready for Pickup', 'Out for Delivery', 'Delivered', 'Cancelled'];
  const status = prompt('Set status:\n\n' + choices.map((c, i) => `${i + 1}. ${c}`).join('\n') + '\n\nType the status name:');
  if (!status?.trim()) return;
  const r = await api('updateOrder', { orderKey, updates: { status: status.trim() }, managerName: 'Manager' });
  const ok = r.success === true || r.airtableRecord || (!r.error && r.success !== false);
  if (ok) {
    toast('Status → "' + status.trim() + '"', 'success');
    _allOrders = []; await fetchAllOrders(); applyAndRender();
  } else toast('Update failed', 'error');
}

// ── ANALYTICS ────────────────────────────────────────────────────
async function renderAnalytics() {
  document.getElementById('mainContent').innerHTML = `
    <div style="text-align:center;padding:48px;color:var(--muted);">
      <i class="fa-solid fa-spinner fa-spin" style="font-size:22px;color:var(--wine);margin-bottom:12px;display:block;"></i>
      Building analytics...
    </div>`;

  if (!_allOrders.length) await fetchAllOrders();

  const orders  = _allOrders;
  const paid    = orders.filter(o => o.paymentStatus === 'Paid');
  const total   = orders.length;
  const revenue = paid.reduce((s, o) => s + (o.pricing?.total || 0), 0);
  const avgOrder= paid.length ? Math.round(revenue / paid.length) : 0;

  // ── Last 7 days buckets ──
  const now = Date.now();
  const DAY = 86400000;
  const days7 = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(now - (6 - i) * DAY);
    return {
      label: d.toLocaleDateString('en-NG', { weekday: 'short' }),
      dateStr: d.toDateString(),
      orders: 0, revenue: 0
    };
  });
  orders.forEach(o => {
    const d = new Date(o.timestamps?.orderedAt || o.timestamps?.paidAt || 0);
    const bucket = days7.find(b => b.dateStr === d.toDateString());
    if (bucket) {
      bucket.orders++;
      if (o.paymentStatus === 'Paid') bucket.revenue += (o.pricing?.total || 0);
    }
  });

  // ── Last 4 weeks buckets ──
  const weeks4 = Array.from({ length: 4 }, (_, i) => {
    const start = new Date(now - (3 - i) * 7 * DAY);
    const end   = new Date(now - (2 - i) * 7 * DAY);
    return { label: 'W' + (i + 1), start: start.getTime(), end: end.getTime(), orders: 0, revenue: 0 };
  });
  orders.forEach(o => {
    const t = new Date(o.timestamps?.orderedAt || 0).getTime();
    const bucket = weeks4.find(b => t >= b.start && t < b.end);
    if (bucket) {
      bucket.orders++;
      if (o.paymentStatus === 'Paid') bucket.revenue += (o.pricing?.total || 0);
    }
  });

  // ── Top selling items ──
  const itemMap = {};
  orders.forEach(o => {
    (o.items || []).forEach(it => {
      const k = it.name || 'Unknown';
      if (!itemMap[k]) itemMap[k] = { name: k, qty: 0, revenue: 0 };
      itemMap[k].qty     += (it.qty || 1);
      itemMap[k].revenue += (it.price || 0) * (it.qty || 1);
    });
  });
  const topItems = Object.values(itemMap).sort((a, b) => b.qty - a.qty).slice(0, 7);

  // ── Status breakdown ──
  const statusMap = {};
  orders.forEach(o => { const k = o.status || 'Unknown'; statusMap[k] = (statusMap[k] || 0) + 1; });
  const statusEntries = Object.entries(statusMap).sort((a, b) => b[1] - a[1]);

  // ── Category revenue ──
  const catMap = {};
  orders.forEach(o => {
    (o.items || []).forEach(it => {
      const k = it.category || 'other';
      if (!catMap[k]) catMap[k] = { revenue: 0, qty: 0 };
      catMap[k].revenue += (it.price || 0) * (it.qty || 1);
      catMap[k].qty     += (it.qty || 1);
    });
  });

  // ── Week-on-week change ──
  const thisWeekRev = weeks4[3]?.revenue || 0;
  const lastWeekRev = weeks4[2]?.revenue || 0;
  const revChange   = lastWeekRev > 0 ? Math.round(((thisWeekRev - lastWeekRev) / lastWeekRev) * 100) : 0;
  const thisWeekOrd = weeks4[3]?.orders || 0;
  const lastWeekOrd = weeks4[2]?.orders || 0;
  const ordChange   = lastWeekOrd > 0 ? Math.round(((thisWeekOrd - lastWeekOrd) / lastWeekOrd) * 100) : 0;

  // Today stats
  const today = orders.filter(o => new Date(o.timestamps?.orderedAt || 0).toDateString() === new Date().toDateString());
  const todayRev = today.filter(o => o.paymentStatus === 'Paid').reduce((s, o) => s + (o.pricing?.total || 0), 0);

  // ── Build bar chart SVG ──
  function buildBarChart(data, valueKey, color, height = 100) {
    const max = Math.max(...data.map(d => d[valueKey]), 1);
    return data.map(d => {
      const pct   = (d[valueKey] / max) * height;
      const label = valueKey === 'revenue' ? '₦' + (d[valueKey] / 1000).toFixed(0) + 'k' : d[valueKey];
      return `<div class="bar-col">
        <div class="bar-fill" style="height:${Math.max(pct, 4)}px;background:${color};position:relative;">
          <div class="bar-fill-tooltip">${label}</div>
        </div>
        <div class="bar-label">${d.label}</div>
      </div>`;
    }).join('');
  }

  // ── Donut SVG ──
  function buildDonut(slices, r = 40) {
    const total  = slices.reduce((s, sl) => s + sl.val, 0) || 1;
    const cx = 50, cy = 50;
    let angle = -90;
    const paths = slices.map(sl => {
      const pct   = sl.val / total;
      const sweep = pct * 360;
      const rad1  = (angle * Math.PI) / 180;
      const rad2  = ((angle + sweep) * Math.PI) / 180;
      const x1    = cx + r * Math.cos(rad1);
      const y1    = cy + r * Math.sin(rad1);
      const x2    = cx + r * Math.cos(rad2);
      const y2    = cy + r * Math.sin(rad2);
      const large = sweep > 180 ? 1 : 0;
      const path  = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
      angle += sweep;
      return `<path d="${path}" fill="${sl.color}" />`;
    });
    // Inner circle to make it a donut
    return `<svg viewBox="0 0 100 100" width="100" height="100" class="donut-svg">
      ${paths.join('')}
      <circle cx="${cx}" cy="${cy}" r="${r * 0.52}" fill="white"/>
      <text x="${cx}" y="${cy - 4}" text-anchor="middle" font-size="10" font-weight="800" fill="${'#111827'}">${total}</text>
      <text x="${cx}" y="${cy + 8}" text-anchor="middle" font-size="7" fill="${'#6b7280'}">orders</text>
    </svg>`;
  }

  // Payment donut
  const paidCount    = paid.length;
  const pendingCount = orders.filter(o => o.paymentStatus !== 'Paid').length;
  const payDonut     = buildDonut([
    { val: paidCount,    color: '#16a34a', label: 'Paid' },
    { val: pendingCount, color: '#fbbf24', label: 'Pending' }
  ]);

  // Status donut (top 5)
  const donutColors = ['#8B1E3F', '#2563eb', '#d97706', '#16a34a', '#6d28d9'];
  const statusDonut = buildDonut(
    statusEntries.slice(0, 5).map((([s, c], i) => ({ val: c, color: donutColors[i] || '#9ca3af', label: s })))
  );

  // Category bar
  const catColors = { foods:'#8B1E3F', desserts:'#d97706', smoothies:'#16a34a', coffee:'#2563eb', mocktails:'#6d28d9' };
  const catEntries = Object.entries(catMap).sort((a, b) => b[1].revenue - a[1].revenue);
  const catMax = Math.max(...catEntries.map(([, v]) => v.revenue), 1);

  document.getElementById('mainContent').innerHTML = `
    <!-- KPI ROW -->
    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-icon" style="background:var(--wine-light);color:var(--wine);"><i class="fa-solid fa-naira-sign"></i></div>
        <div>
          <div class="kpi-label">Total Revenue</div>
          <div class="kpi-value">${fmt(revenue)}</div>
          <div class="kpi-delta ${revChange >= 0 ? 'up' : 'down'}">
            <i class="fa-solid fa-arrow-${revChange >= 0 ? 'up' : 'down'}"></i> ${Math.abs(revChange)}% vs last week
          </div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon" style="background:var(--info-light);color:var(--info);"><i class="fa-solid fa-receipt"></i></div>
        <div>
          <div class="kpi-label">Total Orders</div>
          <div class="kpi-value">${total}</div>
          <div class="kpi-delta ${ordChange >= 0 ? 'up' : 'down'}">
            <i class="fa-solid fa-arrow-${ordChange >= 0 ? 'up' : 'down'}"></i> ${Math.abs(ordChange)}% vs last week
          </div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon" style="background:var(--success-light);color:var(--success);"><i class="fa-solid fa-chart-line"></i></div>
        <div>
          <div class="kpi-label">Avg. Order Value</div>
          <div class="kpi-value">${fmt(avgOrder)}</div>
          <div class="kpi-delta neutral"><i class="fa-solid fa-minus"></i> Per paid order</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon" style="background:var(--warn-light);color:var(--warn);"><i class="fa-solid fa-sun"></i></div>
        <div>
          <div class="kpi-label">Today's Revenue</div>
          <div class="kpi-value">${fmt(todayRev)}</div>
          <div class="kpi-delta neutral"><i class="fa-solid fa-clock"></i> ${today.length} orders today</div>
        </div>
      </div>
    </div>

    <!-- REVENUE + ORDERS BAR CHARTS -->
    <div class="analytics-grid-2" style="margin-bottom:20px;">
      <div class="chart-card">
        <div class="chart-card-header">
          <div>
            <div class="chart-card-title">Revenue — Last 7 Days</div>
            <div class="chart-card-sub">Daily revenue from paid orders</div>
          </div>
          <div style="text-align:right;">
            <div class="chart-card-value">${fmt(days7.reduce((s,d)=>s+d.revenue,0))}</div>
            <div class="chart-card-delta ${revChange >= 0 ? 'up' : 'down'}">
              <i class="fa-solid fa-arrow-${revChange >= 0 ? 'up' : 'down'}"></i> ${Math.abs(revChange)}% WoW
            </div>
          </div>
        </div>
        <div class="bar-chart">${buildBarChart(days7, 'revenue', 'var(--wine)')}</div>
      </div>
      <div class="chart-card">
        <div class="chart-card-header">
          <div>
            <div class="chart-card-title">Orders — Last 7 Days</div>
            <div class="chart-card-sub">Total orders per day</div>
          </div>
          <div style="text-align:right;">
            <div class="chart-card-value">${days7.reduce((s,d)=>s+d.orders,0)}</div>
            <div class="chart-card-delta ${ordChange >= 0 ? 'up' : 'down'}">
              <i class="fa-solid fa-arrow-${ordChange >= 0 ? 'up' : 'down'}"></i> ${Math.abs(ordChange)}% WoW
            </div>
          </div>
        </div>
        <div class="bar-chart">${buildBarChart(days7, 'orders', 'var(--info)')}</div>
      </div>
    </div>

    <!-- WEEKLY TREND + TOP ITEMS + PAYMENT SPLIT -->
    <div class="analytics-grid" style="margin-bottom:20px;">
      <div class="chart-card">
        <div class="chart-card-header">
          <div>
            <div class="chart-card-title">Weekly Revenue Trend</div>
            <div class="chart-card-sub">Last 4 weeks</div>
          </div>
        </div>
        <div class="bar-chart" style="height:90px;">${buildBarChart(weeks4, 'revenue', 'var(--gold)')}</div>
        <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px;">
          <div class="trend-bar-wrap">
            ${weeks4.map(w => `
              <div class="trend-bar-row">
                <div class="trend-bar-label">${w.label}</div>
                <div class="trend-bar-track"><div class="trend-bar-fill" style="width:${Math.round((w.revenue/(Math.max(...weeks4.map(x=>x.revenue),1)))*100)}%;background:var(--gold);"></div></div>
                <div class="trend-bar-val" style="color:var(--wine);">${fmt(w.revenue)}</div>
              </div>`).join('')}
          </div>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-card-header">
          <div>
            <div class="chart-card-title">Payment Split</div>
            <div class="chart-card-sub">${paidCount} paid · ${pendingCount} pending</div>
          </div>
        </div>
        <div class="donut-wrap">
          ${payDonut}
          <div class="donut-legend">
            <div class="donut-legend-item"><div class="donut-legend-dot" style="background:#16a34a;"></div><div class="donut-legend-label">Paid</div><div class="donut-legend-val">${paidCount}</div></div>
            <div class="donut-legend-item"><div class="donut-legend-dot" style="background:#fbbf24;"></div><div class="donut-legend-label">Pending</div><div class="donut-legend-val">${pendingCount}</div></div>
            <div class="donut-legend-item" style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border);">
              <div class="donut-legend-label" style="color:var(--text);font-weight:700;">Collection rate</div>
              <div class="donut-legend-val" style="color:var(--wine);">${total ? Math.round((paidCount/total)*100) : 0}%</div>
            </div>
          </div>
        </div>
        <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px;">
          <div class="chart-card-title" style="margin-bottom:10px;">Order Status Split</div>
          <div class="donut-wrap">
            ${statusDonut}
            <div class="donut-legend">
              ${statusEntries.slice(0, 5).map(([s, c], i) => `
                <div class="donut-legend-item">
                  <div class="donut-legend-dot" style="background:${donutColors[i]||'#9ca3af'};"></div>
                  <div class="donut-legend-label">${s}</div>
                  <div class="donut-legend-val">${c}</div>
                </div>`).join('')}
            </div>
          </div>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-card-header">
          <div>
            <div class="chart-card-title">Top Selling Items</div>
            <div class="chart-card-sub">By quantity ordered</div>
          </div>
        </div>
        <div class="top-items">
          ${topItems.length ? topItems.map((item, i) => `
            <div class="top-item-row">
              <div class="top-item-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i + 1}</div>
              <div class="top-item-name">${item.name}</div>
              <div class="top-item-count">${item.qty}×</div>
              <div class="top-item-rev">${fmt(item.revenue)}</div>
            </div>`).join('')
          : '<div class="empty-state" style="padding:20px;"><i class="fa-solid fa-box-open"></i><h4>No data yet</h4></div>'}
        </div>
      </div>
    </div>

    <!-- CATEGORY REVENUE BREAKDOWN -->
    <div class="chart-card" style="margin-bottom:20px;">
      <div class="chart-card-header">
        <div>
          <div class="chart-card-title">Revenue by Category</div>
          <div class="chart-card-sub">Foods, Desserts, Smoothies, Coffee, Mocktails</div>
        </div>
        <div class="chart-card-value" style="font-size:16px;">${fmt(Object.values(catMap).reduce((s,c)=>s+c.revenue,0))}</div>
      </div>
      <div class="trend-bar-wrap">
        ${catEntries.length ? catEntries.map(([cat, data]) => `
          <div class="trend-bar-row">
            <div class="trend-bar-label" style="text-transform:capitalize;">${cat}</div>
            <div class="trend-bar-track">
              <div class="trend-bar-fill" style="width:${Math.round((data.revenue/catMax)*100)}%;background:${catColors[cat]||'var(--muted)'};"></div>
            </div>
            <div style="font-size:11px;font-weight:700;min-width:80px;text-align:right;color:${catColors[cat]||'var(--muted)'};">${fmt(data.revenue)}</div>
            <div style="font-size:11px;color:var(--muted);min-width:40px;text-align:right;">${data.qty} sold</div>
          </div>`).join('')
        : '<div style="text-align:center;padding:20px;color:var(--muted);">No category data yet</div>'}
      </div>
    </div>`;
}

function switchView(view) {
  _currentPage = 1;
  _selectedOrders.clear();
  switch (view) {
    case 'dashboard':
      _currentFilter = { status: null, payment: null, search: '' };
      setView('dashboard', 'Dashboard', 'Live overview of all restaurant activity');
      loadDashboard();
      break;
    case 'analytics':
      _currentFilter = { status: null, payment: null, search: '' };
      setView('analytics', 'Analytics', 'Revenue trends, order growth and performance insights');
      renderAnalytics();
      break;
    case 'orders':
      // ── ALL ORDERS: always completely clear filter so ALL orders show ──
      _currentFilter = { status: null, payment: null, search: '' };
      setView('orders', 'All Orders', 'Every order placed at Ryan Restaurants');
      renderOrdersTable({});
      break;
    case 'active':
      _currentFilter = { status: 'Preparing', payment: null, search: '' };
      setView('active', 'Active Orders', 'Currently being prepared or in transit');
      renderOrdersTable({ status: 'Preparing' });
      break;
    case 'paid':
      _currentFilter = { status: null, payment: 'Paid', search: '' };
      setView('paid', 'Paid Orders', 'All confirmed payments');
      renderOrdersTable({ payment: 'Paid' });
      break;
    case 'delivered':
      _currentFilter = { status: 'Delivered', payment: null, search: '' };
      setView('delivered', 'Delivered Orders', 'Successfully delivered orders');
      renderOrdersTable({ status: 'Delivered' });
      break;
    case 'search':
      _currentFilter = { status: null, payment: null, search: '' };
      setView('search', 'Search Orders', 'Find any order by ID, customer or address');
      renderOrdersTable({});
      setTimeout(() => document.getElementById('searchInput')?.focus(), 200);
      break;
  }
}

document.querySelectorAll('.nav-item[data-view]').forEach(btn => {
  btn.addEventListener('click', () => switchView(btn.dataset.view));
});

// ── TOOLBAR ──────────────────────────────────────────────────────
document.getElementById('refreshBtn').addEventListener('click', async () => {
  _allOrders = []; setStatus('connected', 'Refreshing…');
  await fetchAllOrders();
  if (_currentView === 'dashboard') loadDashboard();
  else applyAndRender();
  toast('Data refreshed', 'info');
});
document.getElementById('refreshNav').addEventListener('click', () => document.getElementById('refreshBtn').click());

document.getElementById('exportBtn').addEventListener('click', () => {
  if (!_allOrders.length) { toast('No orders to export', 'error'); return; }
  const header = '"Order ID","Customer","Address","Items","Total","Payment","Status","Date"';
  const rows   = _allOrders.map(o => [
    o.orderId,
    o.customer?.name || o._customerName || 'Guest',
    o.customer?.address || o._address || '',
    (o.items || []).map(i => `${i.name}x${i.qty || 1}`).join(' | '),
    o.pricing?.total || 0,
    o.paymentStatus, o.status,
    o.timestamps?.orderedAt || ''
  ].map(v => '"' + String(v).replace(/"/g, '""') + '"').join(','));
  const blob = new Blob([[header, ...rows].join('\n')], { type: 'text/csv' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'ryan-orders-' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  toast('Orders exported as CSV', 'success');
});
</script>
</body>
</html>
